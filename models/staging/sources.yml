sources:
  - name: tpch
    database: samples
    schema: tpch
    tables:
      - name: orders
        description: "One record per order"
        columns:
          - name: o_orderkey
            data_tests:
              - unique
              - not_null
      - name: customer
        description: "One record per customer"
        columns:
          - name: c_custkey
            data_tests:
              - unique
              - not_null
      - name: lineitem
        description: "One record per line item within a single order (1 -> n)"
