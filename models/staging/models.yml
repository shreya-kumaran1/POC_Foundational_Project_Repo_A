version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
        constraints:
          - type: primary_key

  - name: stg_orders
    columns:
      - name: order_key
        tests:
          - not_null
          - unique
        constraints:
          - type: primary_key

